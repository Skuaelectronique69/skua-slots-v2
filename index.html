<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SKUA FLOAT — Slots</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <main class="app">
    <div class="banner">SKUA FLOAT NETWORK · NODE: CASINO-01 · SECTEUR 7</div>

    <section class="card">
      <h1>🎰 SkuaSlots</h1>
      <p class="sub">ORIGIN FLOAT est en ligne. Génère de l’énergie. Monte en grade.</p>

      <div class="slots" id="slots">
        <div>⚙️</div><div>⚡</div><div>🌊</div>
      </div>

      <button id="spin">SPIN · 10 ENERGY</button>

      <div class="stats">
        <p>Grade : <b id="grade">RECRUIT</b></p>
        <p>Énergie : <b id="energy">100</b></p>
        <p>XP : <b id="xp">0</b></p>
        <p>Crédits : <b id="credits">500</b></p>
      </div>

      <div class="quest">
        <h2>📡 Skua Quest</h2>
        <p id="message">Mission active : lancer 5 spins.</p>
      </div>

      <div class="leaderboard">
        <h2>🏆 TOP PLAYERS</h2>
        <div id="leaderboard">Chargement du classement...</div>
      </div>

    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
